ai_provider_openrouter.settings:
  type: config_object
  label: 'OpenRouter Provider settings'
  mapping:
    api_key:
      type: string
      label: 'API key (Key module entry)'
    base_url:
      type: string
      label: 'API base URL'
    enabled_models:
      type: sequence
      label: 'Enabled OpenRouter models'
      sequence:
        type: string
    streaming:
      type: boolean
      label: 'Enable streaming responses'
    default_provider:
      type: boolean
      label: 'Set OpenRouter as default provider'
